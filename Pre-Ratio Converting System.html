<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratio Convertor - RIF Automation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 30px 15px;
        }
        .container {
            max-width: 1000px;
            background: #ffffff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        h2, h3 {
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        h2 { text-align: center; margin-bottom: 30px; }
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .file-upload-box {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .file-upload-box:hover {
            border-color: #2563eb;
            background: #f1f5f9;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #475569;
        }
        input[type="file"], input[type="text"] {
            display: block;
            width: 100%;
            font-size: 14px;
            box-sizing: border-box;
        }
        input[type="text"] {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }
        .action-area {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        button {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background-color: #2563eb; color: white; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-success { background-color: #10b981; color: white; }
        .btn-success:hover { background-color: #059669; }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-info { background-color: #0ea5e9; color: white; }
        .btn-info:hover { background-color: #0284c7; }
        
        #status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .success { background-color: #dcfce7; color: #166534; }
        .error { background-color: #fee2e2; color: #991b1b; }
        .info { background-color: #e0f2fe; color: #0369a1; }

        /* Registry Management Controls */
        .registry-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
            justify-content: space-between;
        }
        .search-box {
            flex: 1;
            max-width: 400px;
        }
        .search-box input {
            padding: 8px 12px;
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        /* Registry Scroll Wrapper */
        .registry-wrapper {
            max-height: 350px;
            overflow-y: scroll;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #ffffff;
        }

        /* Custom Scrollbar Styling */
        .registry-wrapper::-webkit-scrollbar {
            width: 14px;
        }
        .registry-wrapper::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-left: 1px solid #e2e8f0;
        }
        .registry-wrapper::-webkit-scrollbar-thumb {
            background: #888888;
            border-radius: 10px;
            border: 3px solid #f1f5f9;
        }
        .registry-wrapper::-webkit-scrollbar-thumb:hover {
            background: #555555;
        }
        .registry-wrapper::-webkit-scrollbar-button:single-button {
            background-color: #f1f5f9;
            display: block;
            background-size: 10px;
            background-repeat: no-repeat;
            background-position: center;
            height: 14px;
        }
        .registry-wrapper::-webkit-scrollbar-button:single-button:decrement {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' fill='%23555'><polygon points='50,20 20,80 80,80'/></svg>");
        }
        .registry-wrapper::-webkit-scrollbar-button:single-button:increment {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' fill='%23555'><polygon points='50,80 20,20 80,20'/></svg>");
        }

        .list-table, .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        .list-table th, .list-table td, .data-table th, .data-table td {
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }
        .list-table th, .data-table th {
            background-color: #f8fafc;
            color: #334155;
            position: sticky;
            top: 0;
            z-index: 5;
            box-shadow: inset 0 -1px 0 #e2e8f0;
        }
        
        /* Data Editor Styling */
        .editor-section {
            margin-top: 30px;
            display: none;
        }
        .table-wrapper {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            margin-top: 15px;
        }
        .editable-cell {
            background-color: #fffdf5;
            cursor: pointer;
        }
        .editable-cell:focus {
            background-color: #fff;
            outline: 2px solid #2563eb;
        }
        .checkbox-col {
            text-align: center;
            width: 40px;
        }
        .checkbox-col input {
            transform: scale(1.1);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ratio Convertor (RIF Automation)</h2>
    
    <div class="grid-inputs">
        <div class="file-upload-box">
            <label for="file1">1. Pre-Ratio File (.xlsx, .xls):</label>
            <input type="file" id="file1" accept=".xlsx, .xls">
        </div>
        <div class="file-upload-box">
            <label for="file2">2. Ratio File (.xlsx, .xls):</label>
            <input type="file" id="file2" accept=".xlsx, .xls">
        </div>
    </div>

    <div class="action-area">
        <label for="saveName">Save As Name (Give a name to save or download):</label>
        <input type="text" id="saveName" value="Ratio_Convertor_Output">
        
        <div class="btn-group">
            <button class="btn-primary" onclick="processExcelAutomation()">Process Data</button>
            <button class="btn-success" id="saveBtn" onclick="saveCurrentDataToList()" disabled>Save File to List</button>
        </div>
        <div id="status-message"></div>
    </div>

    <h3>Saved Files Registry</h3>
    
    <div class="registry-controls">
        <div class="search-box">
            <input type="text" id="registrySearch" placeholder="🔍 Search Saved Files..." oninput="filterRegistryList()">
        </div>
        <div>
            <button class="btn-danger" style="padding: 8px 16px; font-size: 14px;" onclick="deleteSelectedFiles()">Delete Selected</button>
        </div>
    </div>

    <div class="registry-wrapper">
        <table class="list-table">
            <thead>
                <tr>
                    <th class="checkbox-col"><input type="checkbox" id="selectAllCheck" onclick="toggleSelectAll(this)"></th>
                    <th>File Name</th>
                    <th>Total Rows</th>
                    <th style="width: 250px; text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody id="savedFilesBody">
                <tr>
                    <td colspan="4" style="text-align: center; color: #94a3b8;">No saved files found in local storage.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="editor-section" id="editorSection">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="editorTitle">Data View & Editor</h3>
            <div>
                <button class="btn-info" onclick="updateLiveChanges()">Update Changes</button>
                <button class="btn-success" onclick="downloadDirectFromEditor()">Download Excel</button>
            </div>
        </div>
        <p style="font-size: 13px; color: #64748b; margin-top: -5px;">💡 Click on any yellowish cell to manually edit the value, then click "Update Changes".</p>
        
        <div class="table-wrapper">
            <table class="data-table" id="dataTableMain">
                </table>
        </div>
    </div>
</div>

<script>
let currentActiveData = null; 
let currentEditingFileName = null; 

document.addEventListener("DOMContentLoaded", renderSavedFilesList);

function showStatus(text, type) {
    const el = document.getElementById('status-message');
    el.innerText = text;
    el.className = type;
    el.style.display = 'block';
}

function readExcel(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const json = XLSX.utils.sheet_to_json(worksheet);
            resolve(json);
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

async function processExcelAutomation() {
    const file1Input = document.getElementById('file1').files[0];
    const file2Input = document.getElementById('file2').files[0];
    const saveBtn = document.getElementById('saveBtn');

    if (!file1Input || !file2Input) {
        showStatus("Please select both Pre-Ratio File and Ratio File!", "error");
        return;
    }

    showStatus("Processing Excel files, please wait...", "info");

    try {
        const data1 = await readExcel(file1Input);
        const sizeOrder = data1.map(row => row.SIZE ? String(row.SIZE).trim() : "").filter(s => s !== "");

        if (sizeOrder.length === 0) {
            showStatus("No 'SIZE' column or data found in Pre-Ratio File!", "error");
            return;
        }

        const prodData = await readExcel(file2Input);

        let maxPlateNum = 0;
        const plateSummaryMap = new Map();

        prodData.forEach(row => {
            if (row['Plate#']) {
                const pNum = parseInt(row['Plate#'], 10);
                if (!isNaN(pNum) && pNum > maxPlateNum) {
                    maxPlateNum = pNum;
                }
                if (row['Plate Run'] && !isNaN(pNum)) {
                    plateSummaryMap.set(pNum, parseInt(row['Plate Run'], 10));
                }
            }
        });

        const sortedPlates = Array.from(plateSummaryMap.keys()).sort((a, b) => a - b);
        const outputRows = [];

        sizeOrder.forEach((currentSize, index) => {
            let rowObj = { "AI Filename": currentSize };

            for (let i = 1; i <= maxPlateNum; i++) {
                rowObj["Set " + i] = "";
            }

            const matches = prodData.filter(pRow => pRow.SIZE && String(pRow.SIZE).trim() === currentSize);

            matches.forEach(match => {
                if (match['Plate#'] && match['Repeat']) {
                    const pIdx = parseInt(match['Plate#'], 10);
                    if (!isNaN(pIdx)) {
                        rowObj["Set " + pIdx] = parseInt(match['Repeat'], 10);
                    }
                }
            });

            if (index < sortedPlates.length) {
                rowObj["Imp. (Name)"] = parseInt(sortedPlates[index], 10);
                rowObj["Imp. (Sheet)"] = parseInt(plateSummaryMap.get(sortedPlates[index]), 10);
            } else {
                rowObj["Imp. (Name)"] = "";
                rowObj["Imp. (Sheet)"] = "";
            }

            outputRows.push(rowObj);
        });

        if (sortedPlates.length > sizeOrder.length) {
            for (let i = sizeOrder.length; i < sortedPlates.length; i++) {
                let emptyRow = { "AI Filename": "" };
                for (let s = 1; s <= maxPlateNum; s++) {
                    emptyRow["Set " + s] = "";
                }
                emptyRow["Imp. (Name)"] = parseInt(sortedPlates[i], 10);
                emptyRow["Imp. (Sheet)"] = parseInt(plateSummaryMap.get(sortedPlates[i]), 10);
                outputRows.push(emptyRow);
            }
        }

        currentActiveData = outputRows;
        currentEditingFileName = null; 
        
        showStatus("Data processed perfectly! Click 'Save File to List' or check preview below.", "success");
        saveBtn.disabled = false;
        
        renderLiveEditorTable(outputRows, "Temporary Preview Data");

    } catch (error) {
        console.error(error);
        showStatus("Error parsing Excel files. Please verify data headers.", "error");
    }
}

function saveCurrentDataToList() {
    let name = document.getElementById('saveName').value.trim();
    if(!name) name = "Ratio_Convertor_Output";

    if(!currentActiveData) {
        showStatus("No processed data found to save!", "error");
        return;
    }

    let savedRegistry = JSON.parse(localStorage.getItem('ratioRegistry')) || {};
    savedRegistry[name] = currentActiveData;
    localStorage.setItem('ratioRegistry', JSON.stringify(savedRegistry));

    showStatus(`Successfully saved file "${name}" to local registry list!`, "success");
    currentEditingFileName = name;
    renderSavedFilesList();
}

function renderSavedFilesList() {
    const tbody = document.getElementById('savedFilesBody');
    document.getElementById('selectAllCheck').checked = false; 
    let savedRegistry = JSON.parse(localStorage.getItem('ratioRegistry')) || {};
    const keys = Object.keys(savedRegistry);

    if(keys.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #94a3b8;">No saved files found in local storage.</td></tr>`;
        return;
    }

    tbody.innerHTML = "";
    keys.forEach(key => {
        const rowsCount = savedRegistry[key].length;
        const tr = document.createElement('tr');
        tr.className = "registry-item-row";
        tr.innerHTML = `
            <td class="checkbox-col"><input type="checkbox" class="file-select-check" data-filename="${key}"></td>
            <td class="file-name-cell"><strong>${key}</strong></td>
            <td>${rowsCount} rows</td>
            <td style="text-align: center;">
                <button class="btn-info" style="padding: 4px 10px; font-size:12px;" onclick="loadDataToEditor('${key}')">View / Edit</button>
                <button class="btn-success" style="padding: 4px 10px; font-size:12px;" onclick="downloadFromList('${key}')">Download</button>
                <button class="btn-danger" style="padding: 4px 10px; font-size:12px;" onclick="deleteFromList('${key}')">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
    filterRegistryList(); 
}

function filterRegistryList() {
    const query = document.getElementById('registrySearch').value.toLowerCase().trim();
    const rows = document.querySelectorAll('#savedFilesBody .registry-item-row');
    
    rows.forEach(row => {
        const nameText = row.querySelector('.file-name-cell').innerText.toLowerCase();
        if(nameText.includes(query)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
}

function toggleSelectAll(masterBox) {
    const checkboxes = document.querySelectorAll('#savedFilesBody .file-select-check');
    checkboxes.forEach(box => {
        if(box.closest('tr').style.display !== "none") {
            box.checked = masterBox.checked;
        }
    });
}

function deleteSelectedFiles() {
    const checkboxes = document.querySelectorAll('#savedFilesBody .file-select-check:checked');
    if(checkboxes.length === 0) {
        alert("Please select at least one file to remove!");
        return;
    }

    if(confirm(`Are you sure you want to delete the ${checkboxes.length} selected file(s)?`)) {
        let savedRegistry = JSON.parse(localStorage.getItem('ratioRegistry')) || {};
        
        checkboxes.forEach(box => {
            const key = box.getAttribute('data-filename');
            delete savedRegistry[key];
            
            if(currentEditingFileName === key) {
                document.getElementById('editorSection').style.display = 'none';
                currentActiveData = null;
                currentEditingFileName = null;
            }
        });

        localStorage.setItem('ratioRegistry', JSON.stringify(savedRegistry));
        renderSavedFilesList();
        showStatus("Selected files deleted successfully.", "error");
    }
}

function loadDataToEditor(key) {
    let savedRegistry = JSON.parse(localStorage.getItem('ratioRegistry')) || {};
    if(savedRegistry[key]) {
        currentActiveData = savedRegistry[key];
        currentEditingFileName = key;
        document.getElementById('saveName').value = key;
        document.getElementById('saveBtn').disabled = false;
        renderLiveEditorTable(currentActiveData, `File View: ${key}`);
        showStatus(`Loaded file "${key}" details into viewer grid below.`, "success");
    }
}

function renderLiveEditorTable(dataArray, title) {
    const table = document.getElementById('dataTableMain');
    const section = document.getElementById('editorSection');
    document.getElementById('editorTitle').innerText = title;

    if(!dataArray || dataArray.length === 0) return;

    table.innerHTML = "";
    section.style.display = 'block';

    const headers = Object.keys(dataArray[0]);
    const thead = document.createElement('thead');
    const headerTr = document.createElement('tr');
    headers.forEach(h => {
        const th = document.createElement('th');
        th.innerText = h;
        headerTr.appendChild(th);
    });
    thead.appendChild(headerTr);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    dataArray.forEach((row, rowIndex) => {
        const tr = document.createElement('tr');
        headers.forEach(h => {
            const td = document.createElement('td');
            td.innerText = row[h] === undefined ? "" : row[h];
            td.className = "editable-cell";
            td.contentEditable = "true";
            td.setAttribute('data-row', rowIndex);
            td.setAttribute('data-col', h);
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    table.appendChild(tbody);
}

function updateLiveChanges() {
    if(!currentActiveData) return;

    const cells = document.querySelectorAll('#dataTableMain tbody td.editable-cell');
    cells.forEach(cell => {
        const r = cell.getAttribute('data-row');
        const c = cell.getAttribute('data-col');
        let val = cell.innerText.trim();

        if(val !== "" && !isNaN(val)) {
            currentActiveData[r][c] = parseInt(val, 10);
        } else {
            currentActiveData[r][c] = val;
        }
    });

    if(currentEditingFileName) {
        let savedRegistry = JSON.parse(localStorage.getItem('ratioRegistry')) || {};
        savedRegistry[currentEditingFileName] = currentActiveData;
        localStorage.setItem('ratioRegistry', JSON.stringify(savedRegistry));
        showStatus(`Changes successfully updated inside registry database for "${currentEditingFileName}"!`, "success");
    } else {
        showStatus("Changes updated in temporary view table memory. Save to storage list to lock permanently.", "info");
    }
}

function downloadDirectFromEditor() {
    if(!currentActiveData) return;
    
    let name = document.getElementById('saveName').value.trim();
    if(!name) name = "Ratio_Convertor_Output";

    const ws = XLSX.utils.json_to_sheet(currentActiveData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Output");
    XLSX.writeFile(wb, `${name}.xlsx`);
}

function downloadFromList(key) {
    let savedRegistry = JSON.parse(localStorage.getItem('ratioRegistry')) || {};
    if(savedRegistry[key]) {
        const ws = XLSX.utils.json_to_sheet(savedRegistry[key]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Output");
        XLSX.writeFile(wb, `${key}.xlsx`);
    }
}

function deleteFromList(key) {
    if(confirm(`Are you sure you want to completely delete "${key}" from registry?`)) {
        let savedRegistry = JSON.parse(localStorage.getItem('ratioRegistry')) || {};
        delete savedRegistry[key];
        localStorage.setItem('ratioRegistry', JSON.stringify(savedRegistry));
        
        if(currentEditingFileName === key) {
            document.getElementById('editorSection').style.display = 'none';
            currentActiveData = null;
            currentEditingFileName = null;
        }
        
        renderSavedFilesList();
        showStatus(`File "${key}" has been wiped out successfully.`, "error");
    }
}
</script>

</body>
</html>
