<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIF Automation - Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">
    <div class="max-w-3xl mx-auto bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
        <h1 class="text-2xl font-bold text-emerald-400 mb-6">⚙️ Dynamic Control Panel</h1>
        
        <div class="space-y-6">
            <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-700/50 space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">📢 Notice Board</label>
                    <textarea id="noticeInput" rows="2" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">📞 Contact Info</label>
                    <input type="text" id="contactInput" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm">
                </div>
            </div>

            <div id="toolsContainer" class="space-y-4"></div>
            <button onclick="addNewToolRow()" class="px-4 py-2 bg-emerald-500 text-white text-xs font-bold rounded-lg cursor-pointer">➕ Add New Tool</button>
            <button onclick="saveAllSettings()" class="w-full py-4 bg-blue-600 font-bold text-white rounded-xl cursor-pointer">💾 Save Settings</button>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZQL96ixyp9L5wLJeIw1Mk45VHuj0HGNs",
            authDomain: "rislam945-40b9c.firebaseapp.com",
            databaseURL: "https://rislam945-40b9c-default-rtdb.firebaseio.com",
            projectId: "rislam945-40b9c",
            storageBucket: "rislam945-40b9c.appspot.com",
            messagingSenderId: "35062453898",
            appId: "1:35062453898:web:df84ea1e705e54dfd53f73"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let toolCount = 0;

        function addNewToolRow(title = "", desc = "", url = "") {
            toolCount++;
            document.getElementById('toolsContainer').insertAdjacentHTML('beforeend', `
                <div id="toolRow_${toolCount}" class="tool-row bg-slate-900/40 p-5 rounded-xl border border-slate-700/60 space-y-2">
                    <input type="text" value="${title}" class="tool-title w-full bg-slate-800 p-2 text-sm" placeholder="Title">
                    <input type="text" value="${desc}" class="tool-desc w-full bg-slate-800 p-2 text-sm" placeholder="Description">
                    <input type="text" value="${url}" class="tool-url w-full bg-slate-800 p-2 text-sm" placeholder="File Link">
                </div>
            `);
        }

        database.ref('webSetupDynamic').once('value').then(snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('noticeInput').value = data.notice || "";
                document.getElementById('contactInput').value = data.contact || "";
                data.tools?.forEach(t => addNewToolRow(t.title, t.desc, t.url));
            }
        });

        function saveAllSettings() {
            const tools = Array.from(document.querySelectorAll('.tool-row')).map(row => ({
                title: row.querySelector('.tool-title').value,
                desc: row.querySelector('.tool-desc').value,
                url: row.querySelector('.tool-url').value
            }));
            database.ref('webSetupDynamic').set({
                notice: document.getElementById('noticeInput').value,
                contact: document.getElementById('contactInput').value,
                tools: tools
            }).then(() => alert("Saved!"));
        }
    </script>
</body>
</html>
