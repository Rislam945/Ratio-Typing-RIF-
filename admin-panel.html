<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIF Automation - Dynamic Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

    <div class="max-w-3xl mx-auto bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
        <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-2xl font-bold text-emerald-400">⚙️ Dynamic Setup Panel</h1>
            <a href="index.html" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded text-slate-300">Exit Panel</a>
        </div>

        <div class="space-y-6">
            <!-- Notice Board -->
            <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-700/50">
                <label class="block text-sm font-semibold text-slate-300 mb-2">📢 Notice Board Text</label>
                <textarea id="noticeInput" rows="2" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:border-emerald-500 outline-none" placeholder="Enter dashboard notice..."></textarea>
            </div>

            <!-- Resource Links -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-900/50 p-5 rounded-xl border border-slate-700/50">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">🎥 YouTube Video URL</label>
                    <input type="text" id="youtubeInput" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm focus:border-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">📁 Google Drive URL</label>
                    <input type="text" id="driveInput" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm focus:border-emerald-500 outline-none">
                </div>
            </div>

            <!-- Dynamic Tools Section Header -->
            <div class="flex justify-between items-center pt-4 border-t border-slate-700/50">
                <h2 class="text-lg font-bold text-slate-200">🛠️ Manage Prepress Tools</h2>
                <button type="button" onclick="addNewToolRow()" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold rounded-lg transition cursor-pointer flex items-center gap-1">
                    ➕ Add New Tool Box
                </button>
            </div>

            <!-- Tools Container (Where infinite rows will generate) -->
            <div id="toolsContainer" class="space-y-4"></div>

            <!-- Save Button -->
            <button onclick="saveAllSettings()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 font-bold text-white rounded-xl transition shadow-lg cursor-pointer text-base">
                💾 Save All Configurations Live
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZQL96ixyp9L5wLJeIw1Mk45VHuj0HGNs",
            authDomain: "rislam945-40b9c.firebaseapp.com",
            databaseURL: "https://rislam945-40b9c-default-rtdb.firebaseio.com",
            projectId: "rislam945-40b9c",
            storageBucket: "rislam945-40b9c.appspot.com",
            messagingSenderId: "35062453898",
            appId: "1:35062453898:web:df84ea1e705e54dfd53f73"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Counter to maintain tracking IDs
        let toolCount = 0;

        // Function to create a new tool HTML structure dynamically
        function addNewToolRow(title = "", desc = "") {
            toolCount++;
            const container = document.getElementById('toolsContainer');
            
            const rowHtml = `
                <div id="toolRow_${toolCount}" class="tool-row bg-slate-900/40 p-5 rounded-xl border border-slate-700/60 relative group">
                    <button onclick="removeToolRow(${toolCount})" class="absolute top-4 right-4 text-xs text-red-400 hover:text-red-300 bg-red-500/10 hover:bg-red-500/20 px-2 py-1 rounded border border-red-500/20 opacity-60 group-hover:opacity-100 transition cursor-pointer">
                        ❌ Remove
                    </button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1">Button / Title Name</label>
                            <input type="text" value="${title}" class="tool-title w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500" placeholder="e.g., Ratio Typing System">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1">Description Text</label>
                            <input type="text" value="${desc}" class="tool-desc w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500" placeholder="Describe what this automated script does...">
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHtml);
        }

        // Remove a tool row from UI
        function removeToolRow(id) {
            const row = document.getElementById(`toolRow_${id}`);
            if(row) row.remove();
        }

        // Fetch data from Firebase database
        database.ref('webSetupDynamic').once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('noticeInput').value = data.notice || "";
                document.getElementById('youtubeInput').value = data.youtubeUrl || "";
                document.getElementById('driveInput').value = data.driveUrl || "";
                
                // If tools exist in DB, loop through and output them
                if (data.tools && Array.isArray(data.tools)) {
                    data.tools.forEach(t => {
                        if(t) addNewToolRow(t.title, t.desc);
                    });
                }
            } else {
                // Default structure if empty database
                addNewToolRow("Ratio Typing & Data Input System", "Process layout matrices, balance sheets, and automatically optimize item distribution with precise gap-handling.");
                addNewToolRow("Plate Ratio Plan & Calculator", "Calculate printing ratios, layout margins, and plate repeats for gang run production.");
            }
        });

        // Collect and save all current fields to Firebase
        function saveAllSettings() {
            const rows = document.querySelectorAll('.tool-row');
            const toolsArray = [];

            rows.forEach(row => {
                const titleVal = row.querySelector('.tool-title').value;
                const descVal = row.querySelector('.tool-desc').value;
                
                if (titleVal.trim() !== "") {
                    toolsArray.push({
                        title: titleVal,
                        desc: descVal
                    });
                }
            });

            const updatedData = {
                notice: document.getElementById('noticeInput').value,
                youtubeUrl: document.getElementById('youtubeInput').value,
                driveUrl: document.getElementById('driveInput').value,
                tools: toolsArray
            };

            database.ref('webSetupDynamic').set(updatedData).then(() => {
                alert("Success: Unlimited configurations synced perfectly!");
            }).catch(err => alert("Alert: Failed to sync database rules."));
        }
    </script>
</body>
</html>
