<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RIF অটোমেশন হাব</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <header class="p-4 flex justify-end">
        <button onclick="triggerAdmin()" class="text-xs text-slate-500 hover:text-slate-300 border border-slate-800 px-3 py-1.5 rounded-lg transition cursor-pointer">⚙️ অ্যাডমিন লগইন</button>
    </header>
    <main class="max-w-5xl mx-auto p-8 grid lg:grid-cols-3 gap-8">
        <!-- বাম পাশে টুলস -->
        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-xs font-bold text-slate-500 uppercase">প্রিপ্রেস টুলস</h2>
            <div id="dynamicToolsList" class="space-y-4"></div>
        </div>
        
        <!-- ডান পাশে সাইডবার (নোটিশ + লিংক) -->
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl">
                <h2 class="text-xs font-bold text-emerald-400 uppercase mb-4">📢 নোটিশ বোর্ড</h2>
                <p id="noticeText" class="text-sm italic border-l-2 border-emerald-500 pl-3">লোডিং...</p>
                
                <!-- ইউটিউব ও ড্রাইভ লিংক এখানে আসবে -->
                <div class="mt-6 pt-6 border-t border-slate-800 space-y-3">
                    <a id="ytLink" href="#" target="_blank" class="block text-xs text-slate-400 hover:text-emerald-400 transition">🎬 ইউটিউব ভিডিও ডেমো</a>
                    <a id="driveLink" href="#" target="_blank" class="block text-xs text-slate-400 hover:text-emerald-400 transition">📁 গুগল ড্রাইভ ফাইল</a>
                </div>

                <h2 class="text-xs font-bold text-sky-400 uppercase mt-6 mb-2">📞 যোগাযোগ</h2>
                <p id="contactText" class="text-xs text-slate-400">লোডিং...</p>
            </div>
        </div>
    </main>
    <script>
        const firebaseConfig = { /* আপনার কনফিগ এখানে বসাবেন */ };
        firebase.initializeApp(firebaseConfig);
        firebase.database().ref('webSetupDynamic').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('noticeText').innerText = data.notice || "কোন নোটিশ নেই।";
                document.getElementById('contactText').innerText = data.contact || "তথ্য নেই।";
                // এখানে লিংক আপডেট করা হলো
                document.getElementById('ytLink').href = data.youtubeUrl || "#";
                document.getElementById('driveLink').href = data.driveUrl || "#";
                
                const list = document.getElementById('dynamicToolsList');
                list.innerHTML = "";
                data.tools?.forEach(t => {
                    list.insertAdjacentHTML('beforeend', `<a href="${t.url}" class="block bg-slate-900 border border-slate-800 p-5 rounded-2xl hover:border-emerald-500">
                        <h3 class="font-bold">${t.title}</h3><p class="text-sm text-slate-400">${t.desc}</p></a>`);
                });
            }
        });
        function triggerAdmin() {
            const pass = prompt("পাসওয়ার্ড দিন:");
            if (pass === "0000@0000") window.location.href = "admin-panel.html";
        }
    </script>
</body>
</html>
