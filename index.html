<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RIF অটোমেশন হাব</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <main class="max-w-5xl mx-auto p-8 grid lg:grid-cols-3 gap-8">
        <!-- বামপাশ: বাটন প্যানেল -->
        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-lg font-bold text-gray-600">আপনার টুলস ও লিংকসমূহ</h2>
            <div id="dynamicToolsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
        
        <!-- ডানপাশ: নোটিশ ও সাপোর্ট -->
        <div class="lg:col-span-1">
            <div class="bg-white border border-gray-200 p-6 rounded-2xl shadow-sm">
                <h2 class="font-bold text-blue-600 mb-4">📢 নোটিশ বোর্ড</h2>
                <p id="noticeText" class="text-sm italic text-gray-600 border-l-4 border-blue-500 pl-3">লোডিং...</p>
                <h2 class="font-bold text-gray-700 mt-8 mb-2">📞 যোগাযোগ</h2>
                <p id="contactText" class="text-sm text-gray-500">লোডিং...</p>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = { /* আপনার কনফিগ এখানে বসান */ };
        firebase.initializeApp(firebaseConfig);
        firebase.database().ref('webSetupDynamic').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('noticeText').innerText = data.notice;
                document.getElementById('contactText').innerText = data.contact;
                const list = document.getElementById('dynamicToolsList');
                list.innerHTML = "";
                data.tools?.forEach(t => {
                    list.insertAdjacentHTML('beforeend', `<a href="${t.url}" class="block bg-white border border-gray-200 p-5 rounded-xl hover:shadow-md hover:border-blue-400 transition font-bold text-center">
                        ${t.title}</a>`);
                });
            }
        });
    </script>
</body>
</html>
