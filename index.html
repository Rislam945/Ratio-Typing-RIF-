<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RIF অটোমেশন হাব</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <main class="max-w-5xl mx-auto p-8 grid lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-lg font-bold text-gray-600 mb-4">🛠️ প্রিপ্রেস টুলস</h2>
            <div id="dynamicToolsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
        
        <div class="lg:col-span-1">
            <div class="bg-white border border-gray-200 p-6 rounded-2xl shadow-sm sticky top-8">
                <h2 class="font-bold text-blue-600 mb-4">📢 নোটিশ বোর্ড</h2>
                <p id="noticeText" class="text-sm italic text-gray-600 border-l-4 border-blue-500 pl-3">লোড হচ্ছে...</p>
                <h2 class="font-bold text-gray-700 mt-8 mb-2">📞 যোগাযোগ</h2>
                <p id="contactText" class="text-sm text-gray-500">লোড হচ্ছে...</p>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZQL96ixyp9L5wLJeIw1Mk45VHuj0HGNs",
            authDomain: "rislam945-40b9c.firebaseapp.com",
            databaseURL: "https://rislam945-40b9c-default-rtdb.firebaseio.com",
            projectId: "rislam945-40b9c",
            storageBucket: "rislam945-40b9c.appspot.com",
            messagingSenderId: "35062453898",
            appId: "1:35062453898:web:df84ea1e705e54dfd53f73"
        };
        firebase.initializeApp(firebaseConfig);
        firebase.database().ref('webSetupDynamic').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('noticeText').innerText = data.notice || "কোন নোটিশ নেই";
                document.getElementById('contactText').innerText = data.contact || "তথ্য নেই";
                const list = document.getElementById('dynamicToolsList');
                list.innerHTML = "";
                data.tools?.forEach(t => {
                    list.insertAdjacentHTML('beforeend', `<a href="${t.url}" class="block bg-white border border-gray-200 p-5 rounded-xl hover:shadow-lg hover:border-blue-400 transition font-bold text-center text-blue-600">
                        ${t.title}</a>`);
                });
            }
        });
    </script>
</body>
</html>
